<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pikachu Card</title>

    <link rel="stylesheet" href="style.css" />

    <link
        href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
        rel="stylesheet"
    />
</head>
<body>

    <div class="container">

        <div class="box1">

            <img
                class="logo"
                src="https://cdn.freebiesupply.com/images/large/2x/pokemon-logo-black-transparent.png"
                alt="logo"
            />

            <div class="content">

                <h5>POKEMON GEN I</h5>

                <h1>Pikachu</h1>

                <p>
                    Pikachu is an Electric-type Pokémon introduced
                    in Generation I. Pikachu are small, chubby,
                    and incredibly cute mouse-like Pokémon.
                    They are almost completely covered by
                    yellow fur.
                </p>

                <div class="count">01 / 08</div>

            </div>

            <img
                class="ball"
                src="https://assets.streamlinehq.com/image/private/w_300,h_300,ar_1/f_auto/v1/icons/vector-icons-7/pokeball-xeg9gc4xzwluseur3c3mm.png/pokeball-qdt0o2i0d34nyhk4opt88.png?_a=DATAiZAAZAA0"
                alt="ball"
            />

        </div>

        <div class="box2">

            <i class="ri-menu-line hamburger"></i>

            <div class="dots">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
            </div>

        </div>

        <div class="image">
            <img
                src="https://wallpapers.com/images/hd/pikachu-jumping-animation-ukgzyexqvd3t68b7.jpg"
                alt=""
            />
        </div>

    </div>

</body>
</html>
